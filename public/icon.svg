<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="100%" stop-color="#e91e90"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="32" cy="36" rx="22" ry="18" fill="url(#body)"/>
  <!-- Head -->
  <circle cx="32" cy="24" r="16" fill="#f48fb1"/>
  <!-- Left ear -->
  <ellipse cx="20" cy="12" rx="6" ry="8" fill="#f48fb1" transform="rotate(-15 20 12)"/>
  <ellipse cx="20" cy="12" rx="4" ry="5.5" fill="#e91e90" transform="rotate(-15 20 12)"/>
  <!-- Right ear -->
  <ellipse cx="44" cy="12" rx="6" ry="8" fill="#f48fb1" transform="rotate(15 44 12)"/>
  <ellipse cx="44" cy="12" rx="4" ry="5.5" fill="#e91e90" transform="rotate(15 44 12)"/>
  <!-- Snout -->
  <ellipse cx="32" cy="28" rx="8" ry="6" fill="#e91e90"/>
  <!-- Nostrils -->
  <ellipse cx="29" cy="28" rx="2" ry="1.5" fill="#c2185b"/>
  <ellipse cx="35" cy="28" rx="2" ry="1.5" fill="#c2185b"/>
  <!-- Left eye -->
  <circle cx="25" cy="21" r="3" fill="white"/>
  <circle cx="25.5" cy="20.5" r="1.5" fill="#1a1a2e"/>
  <!-- Right eye -->
  <circle cx="39" cy="21" r="3" fill="white"/>
  <circle cx="39.5" cy="20.5" r="1.5" fill="#1a1a2e"/>
  <!-- Coin slot -->
  <rect x="28" y="5" width="8" height="2.5" rx="1.2" fill="#ffd54f"/>
  <!-- Legs -->
  <rect x="16" y="48" width="6" height="8" rx="3" fill="#e91e90"/>
  <rect x="42" y="48" width="6" height="8" rx="3" fill="#e91e90"/>
  <!-- Coin sparkle -->
  <circle cx="30" cy="4" r="0.8" fill="#fff9c4"/>
  <circle cx="36" cy="4" r="0.8" fill="#fff9c4"/>
</svg>
